<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>365 Dias com Deus</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f2f2f2;
      margin: 0;
      padding: 20px;
      text-align: center;
    }

    #conteudo {
      background: white;
      max-width: 600px;
      margin: auto;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    h2 {
      margin-bottom: 5px;
    }

    h3 {
      margin-top: 0;
      color: #444;
    }

    button {
      margin-top: 20px;
      padding: 10px 15px;
      border: none;
      background: black;
      color: white;
      border-radius: 8px;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.8;
    }
  </style>
</head>

<body>

  <div id="conteudo"></div>

  <button onclick="proximoDia()">Próximo dia</button>

  <!-- SEU ARQUIVO JS -->
  <script src="devocionais.js"></script>

  <script>
    let diaAtual = 0;

    function mostrarDia() {
      const d = devocional[diaAtual];

      document.getElementById("conteudo").innerHTML = `
        <h2>Dia ${d.dia}</h2>
        <h3>${d.titulo}</h3>
        <p><strong>Semana:</strong> ${d.temaSemana}</p>
        <p><strong>${d.diaSemana}</strong></p>
        <p><em>${d.versiculo}</em></p>
        <p>${d.reflexao}</p>
        <p><strong>Oração:</strong> ${d.oracao}</p>
        <p><strong>Louvor:</strong> ${d.louvor}</p>
      `;
    }

    function proximoDia() {
      if (diaAtual < devocional.length - 1) {
        diaAtual++;
        mostrarDia();
      }
    }

    mostrarDia();
  </script>

</body>
</html>
